<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Diff — Compare Two JSON Objects</title>
<meta name="description" content="Compare two JSON objects side by side. See added, removed, and changed keys with syntax highlighting.">
<meta property="og:title" content="JSON Diff — Compare JSON Objects">
<meta property="og:description" content="Side-by-side JSON comparison with diff highlighting.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--add-bg:rgba(63,185,80,.1);--del-bg:rgba(248,81,73,.1);--mod-bg:rgba(210,153,34,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:var(--text2);margin-bottom:24px;font-size:.95rem}
.editors{display:flex;gap:16px;margin-bottom:16px}
.editor{flex:1;display:flex;flex-direction:column}
.editor label{font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:500}
.editor textarea{flex:1;min-height:200px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'SF Mono',Consolas,monospace;font-size:.85rem;resize:vertical;outline:none;tab-size:2}
.editor textarea:focus{border-color:var(--accent)}
.actions{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
button.primary{padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
button.primary:hover{opacity:.85}
button.secondary{padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:.85rem;cursor:pointer}
button.secondary:hover{border-color:var(--accent);color:var(--accent)}
.stats{margin-left:auto;color:var(--text2);font-size:.85rem}
.stats span{font-weight:600}
.stats .added{color:var(--green)}
.stats .removed{color:var(--red)}
.stats .modified{color:var(--yellow)}
.error{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:12px;color:var(--red);margin-bottom:16px;display:none;font-size:.9rem}
.diff-output{display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.diff-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:16px;font-size:.82rem;color:var(--text2)}
.diff-body{font-family:'SF Mono',Consolas,monospace;font-size:.82rem;line-height:1.7;padding:0;max-height:600px;overflow-y:auto}
.diff-line{padding:2px 16px;border-bottom:1px solid rgba(48,54,61,.3);white-space:pre-wrap;word-break:break-all}
.diff-line.added{background:var(--add-bg);color:var(--green)}
.diff-line.removed{background:var(--del-bg);color:var(--red)}
.diff-line.modified{background:var(--mod-bg);color:var(--yellow)}
.diff-line .path{color:var(--text2);margin-right:8px}
.diff-line .op{font-weight:700;margin-right:4px}
.diff-line .val{color:var(--text)}
.diff-line .old-val{text-decoration:line-through;opacity:.6;margin-right:8px}
.no-diff{text-align:center;padding:40px;color:var(--text2)}
footer{text-align:center;padding:32px 16px;color:var(--text2);font-size:.82rem}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:640px){.editors{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
  <h1>JSON Diff</h1>
  <p class="subtitle">Compare two JSON objects. See what changed.</p>

  <div class="editors">
    <div class="editor">
      <label>Original (Left)</label>
      <textarea id="left" placeholder='{"name": "express", "version": "4.18.2"}'></textarea>
    </div>
    <div class="editor">
      <label>Modified (Right)</label>
      <textarea id="right" placeholder='{"name": "express", "version": "4.19.0"}'></textarea>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="compare()">Compare</button>
    <button class="secondary" onclick="loadSample()">Load Sample</button>
    <button class="secondary" onclick="swapSides()">⇄ Swap</button>
    <button class="secondary" onclick="formatBoth()">Format Both</button>
    <div class="stats" id="stats"></div>
  </div>

  <div class="error" id="error"></div>

  <div class="diff-output" id="output">
    <div class="diff-header" id="diffHeader"></div>
    <div class="diff-body" id="diffBody"></div>
  </div>
</div>

<footer>
  <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a> — 62+ free browser-based developer tools
</footer>

<script>
const $ = id => document.getElementById(id);

function loadSample() {
  $('left').value = JSON.stringify({
    name: "my-app",
    version: "1.0.0",
    dependencies: {
      express: "^4.18.2",
      lodash: "^4.17.21",
      moment: "^2.29.4"
    },
    scripts: {
      start: "node index.js",
      test: "jest"
    },
    author: "Alice"
  }, null, 2);

  $('right').value = JSON.stringify({
    name: "my-app",
    version: "1.1.0",
    dependencies: {
      express: "^4.19.0",
      lodash: "^4.17.21",
      dayjs: "^1.11.10"
    },
    scripts: {
      start: "node index.js",
      test: "vitest",
      lint: "eslint ."
    },
    license: "MIT"
  }, null, 2);

  compare();
}

function swapSides() {
  const l = $('left').value, r = $('right').value;
  $('left').value = r;
  $('right').value = l;
  compare();
}

function formatBoth() {
  try { $('left').value = JSON.stringify(JSON.parse($('left').value), null, 2); } catch {}
  try { $('right').value = JSON.stringify(JSON.parse($('right').value), null, 2); } catch {}
}

function compare() {
  const errEl = $('error');
  errEl.style.display = 'none';

  let left, right;
  try { left = JSON.parse($('left').value); } catch (e) { errEl.textContent = 'Left JSON: ' + e.message; errEl.style.display = 'block'; return; }
  try { right = JSON.parse($('right').value); } catch (e) { errEl.textContent = 'Right JSON: ' + e.message; errEl.style.display = 'block'; return; }

  const diffs = [];
  deepDiff(left, right, '', diffs);

  const added = diffs.filter(d => d.type === 'added').length;
  const removed = diffs.filter(d => d.type === 'removed').length;
  const modified = diffs.filter(d => d.type === 'modified').length;

  $('stats').innerHTML = `<span class="added">${added} added</span> · <span class="removed">${removed} removed</span> · <span class="modified">${modified} modified</span>`;

  const output = $('output');
  const header = $('diffHeader');
  const body = $('diffBody');

  if (diffs.length === 0) {
    header.textContent = '';
    body.innerHTML = '<div class="no-diff">No differences found. The JSON objects are identical.</div>';
    output.style.display = 'block';
    return;
  }

  header.innerHTML = `<span>${diffs.length} difference${diffs.length > 1 ? 's' : ''} found</span>`;

  body.innerHTML = diffs.map(d => {
    const cls = d.type === 'added' ? 'added' : d.type === 'removed' ? 'removed' : 'modified';
    const op = d.type === 'added' ? '+' : d.type === 'removed' ? '−' : '~';

    if (d.type === 'modified') {
      return `<div class="diff-line ${cls}"><span class="op">${op}</span><span class="path">${d.path}</span><span class="old-val">${formatVal(d.oldVal)}</span> → <span class="val">${formatVal(d.newVal)}</span></div>`;
    }
    return `<div class="diff-line ${cls}"><span class="op">${op}</span><span class="path">${d.path}</span><span class="val">${formatVal(d.val)}</span></div>`;
  }).join('');

  output.style.display = 'block';
}

function deepDiff(a, b, path, diffs) {
  if (a === b) return;

  if (typeof a !== typeof b || a === null || b === null || Array.isArray(a) !== Array.isArray(b)) {
    diffs.push({ type: 'modified', path: path || '(root)', oldVal: a, newVal: b });
    return;
  }

  if (typeof a !== 'object') {
    diffs.push({ type: 'modified', path: path || '(root)', oldVal: a, newVal: b });
    return;
  }

  if (Array.isArray(a)) {
    const maxLen = Math.max(a.length, b.length);
    for (let i = 0; i < maxLen; i++) {
      const p = path ? `${path}[${i}]` : `[${i}]`;
      if (i >= a.length) diffs.push({ type: 'added', path: p, val: b[i] });
      else if (i >= b.length) diffs.push({ type: 'removed', path: p, val: a[i] });
      else deepDiff(a[i], b[i], p, diffs);
    }
    return;
  }

  const allKeys = new Set([...Object.keys(a), ...Object.keys(b)]);
  for (const key of allKeys) {
    const p = path ? `${path}.${key}` : key;
    if (!(key in a)) diffs.push({ type: 'added', path: p, val: b[key] });
    else if (!(key in b)) diffs.push({ type: 'removed', path: p, val: a[key] });
    else deepDiff(a[key], b[key], p, diffs);
  }
}

function formatVal(val) {
  if (val === null) return '<span style="color:var(--text2)">null</span>';
  if (val === undefined) return '<span style="color:var(--text2)">undefined</span>';
  if (typeof val === 'string') return `"${escapeHtml(val)}"`;
  if (typeof val === 'object') {
    const s = JSON.stringify(val);
    return s.length > 80 ? escapeHtml(s.slice(0, 80)) + '…' : escapeHtml(s);
  }
  return String(val);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
